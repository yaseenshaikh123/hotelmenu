<<!DOCTYPE html>
<html>
<head>
    <title>Payment</title>

    <style>
        body {
            font-family: Arial;
            background: #f5f5f5;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .payment-box {
            background: white;
            padding: 25px;
            width: 320px;
            border-radius: 15px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.2);
            text-align: center;
        }

        h2 {
            margin-bottom: 10px;
        }

        .amount {
            font-size: 22px;
            font-weight: bold;
            color: green;
            margin: 10px 0;
        }

        .upi-box {
            background: #eee;
            padding: 10px;
            border-radius: 8px;
            margin: 10px 0;
        }

        .qr {
            margin: 15px 0;
        }

        .qr img {
            width: 150px;
        }

        button {
            width: 100%;
            padding: 12px;
            background: #4CAF50;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
        }

        button:hover {
            background: #45a049;
        }

        .success {
            display: none;
            color: green;
            font-weight: bold;
            margin-top: 15px;
        }
    </style>
</head>

<body>

<div class="payment-box">

    <h2>UPI Payment</h2>

    <p>Pay to:</p>
    <div class="upi-box">yaseen@upi</div>

    <div class="amount">₹{{ order.total }}</div>

    <div class="qr">
        <img src="https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=upi://pay?pa=yaseen@upi">
    </div>

    <button onclick="payNow()">Pay Now</button>

    <div class="success" id="successMsg">
        ✅ Payment Successful!
    </div>

</div>

<script>
function payNow(){
    document.getElementById("successMsg").style.display = "block";

    setTimeout(function(){
        window.location.href = "/order/{{ order.id }}/";
    }, 2000);
}
</script>

</body>
</html>
