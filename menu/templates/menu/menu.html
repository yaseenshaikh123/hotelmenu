
<<<!DOCTYPE html>
<html>
<head>
    <title>Yaseen Food's Corner</title>

    <style>
        body {
            margin: 0;
            font-family: Arial;
            background: #fff8f0;
        }
        .form-group {
    margin-bottom: 10px;
    }

       .form-group label {
        display: block;
        font-weight: bold;
        margin-bottom: 3px;
        }

       .form-group input,
       .form-group textarea {
        width: 100%;
        padding: 8px;
        border-radius: 6px;
        border: 1px solid #ccc;
        }

        h1 {
            text-align: center;
            padding: 20px;
            background: #ff4d4d;
            color: white;
            margin: 0;
        }

        .container {
            display: flex;
        }

        .menu {
            width: 70%;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            padding: 20px;
        }

        .card {
            background: white;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }

        .card img {
            width: 100%;
            height: 180px;
            object-fit: cover;
        }

        .card-content {
            padding: 15px;
        }

        .price {
            color: green;
            font-weight: bold;
        }

        button {
            width: 100%;
            padding: 10px;
            background: #ff4d4d;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            margin-top: 10px;
        }

        .cart {
            width: 30%;
            background: #fff;
            padding: 20px;
            border-left: 2px solid #ddd;
        }
    </style>
</head>

<body>

<h1>🍽️ Yaseen Food's Corner</h1>

<div class="container">

<div class="menu">
{% for dish in dishes %}
<div class="card">

    {% if dish.image %}
        <img src="{{ dish.image.url }}">
    {% endif %}

    <div class="card-content">
        <h3>{{ dish.name }}</h3>
        <p class="price">₹{{ dish.price }}</p>

        <button onclick="addItem('{{ dish.name }}', {{ dish.price }})">+</button>
        <button onclick="removeItem('{{ dish.name }}')">-</button>
    </div>

</div>
{% endfor %}
</div>

<div class="cart">
    <h2>Your Cart 🛒</h2>

    <div id="orderList"></div>
    <p id="total">Total: ₹0</p>

    <div class="form-group">
    <label>Name:</label>
    <input type="text" id="name">
</div>

<div class="form-group">
    <label>Phone Number:</label>
    <input type="text" id="phone">
</div>

<div class="form-group">
    <label>Address:</label>
    <textarea id="address"></textarea>
</div>
    <button onclick="placeOrder()">Place Order</button>
</div>

</div>

<script>
let cart = {};

function addItem(name, price){
    if(cart[name]){
        cart[name].qty += 1;
    } else {
        cart[name] = {price:price, qty:1};
    }
    showOrder();
}

function removeItem(name){
    if(cart[name]){
        cart[name].qty -= 1;
        if(cart[name].qty <= 0){
            delete cart[name];
        }
    }
    showOrder();
}

function showOrder(){
    let text = "";
    let total = 0;

    for(let item in cart){
        let qty = cart[item].qty;
        let price = cart[item].price;

        text += item + " (" + qty + ") - ₹" + (qty * price) + "<br>";
        total += qty * price;
    }

    document.getElementById("orderList").innerHTML = text;
    document.getElementById("total").innerHTML = "Total: ₹" + total;
}

function placeOrder(){

    let name = document.getElementById("name").value;
    let phone = document.getElementById("phone").value;
    let address = document.getElementById("address").value;

    if(!name || !phone || !address){
        alert("Please fill all details");
        return;
    }

    fetch('/save-order/', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({
            items: JSON.stringify(cart),
            total: Object.values(cart).reduce((sum, item) => sum + item.price * item.qty, 0),
            name: name,
            phone: phone,
            address: address
        })
    })
    .then(res => res.json())
    .then(data => {
        alert("🎉 Order placed successfully!");

        setTimeout(function(){
            window.location.href = "/payment/" + data.order_id + "/";
        }, 1500);
    });
}
</script>

</body>
</html>
