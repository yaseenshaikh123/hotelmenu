
<<!DOCTYPE html>
<html>
<head>
    <title>Payment</title>

    <style>
        body {
            font-family: Arial;
            background: linear-gradient(135deg, #ff4d4d, #ff944d);
            margin: 0;
        }

        .box {
            width: 350px;
            margin: 80px auto;
            background: white;
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
            text-align: center;
        }

        h2 {
            margin-bottom: 10px;
        }

        .amount {
            font-size: 24px;
            color: green;
            margin-bottom: 20px;
        }

        input {
            width: 90%;
            padding: 10px;
            margin: 10px 0;
            border-radius: 8px;
            border: 1px solid #ccc;
        }

        button {
            width: 100%;
            padding: 12px;
            background: #ff4d4d;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            cursor: pointer;
        }

        button:hover {
            background: #e60000;
        }

        .success {
            display: none;
            color: green;
            margin-top: 15px;
            font-weight: bold;
        }
    </style>
</head>

<body>

<div class="box">
    <h2>💳 UPI Payment</h2>

    <p class="amount">₹{{ order.total }}</p>

    <input type="text" placeholder="Enter UPI ID">
    <input type="text" placeholder="Name">

    <button onclick="payNow()">Pay Now</button>

    <div class="success" id="successMsg">
        ✅ Payment Successful!
    </div>
</div>

<script>
function payNow(){
    document.getElementById("successMsg").style.display = "block";

    setTimeout(function(){
        window.location.href = "/order/{{ order.id }}/";
    }, 2000);
}
</script>

</body>
</html>
